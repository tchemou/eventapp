name: nexgen_events
description: "NexGen Events - Event Ticketing Application"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ✅ FIX : ajout de flutter_localizations pour la gestion des locales (fr_FR)
  flutter_localizations:
    sdk: flutter

  # HTTP & Network
  dio: ^5.3.0
  pretty_dio_logger: ^1.3.1

  # State Management
  provider: ^6.0.0

  # Data Serialization
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1

  # Navigation
  go_router: ^13.0.0

  # Utilities
  intl: 0.20.2
  uuid: ^4.0.0
  shared_preferences: ^2.2.0

  # UI/UX
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.7
  shimmer: ^3.0.0
  lottie: ^3.1.0
  pinput: ^6.0.2

  # Date & Time
  table_calendar: ^3.0.8

  # QR Code
  qr_flutter: ^4.1.0

  # Image Picker
  image_picker: ^1.0.0

  # Maps
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Payment
  flutter_stripe: ^11.1.0
  smart_auth: ^3.2.0
  flutterwave_standard: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.6
  freezed: ^2.4.1
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/fonts/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/poppins/Poppins-Regular.ttf
        - asset: assets/fonts/poppins/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/poppins/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/poppins/Poppins-Bold.ttf
          weight: 700